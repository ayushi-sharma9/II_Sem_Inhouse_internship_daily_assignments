<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPulse // Premium Student Directory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --card-btn-bg: #4f46e5;
            --card-btn-active: #ef4444;
        }

        [data-bs-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(15, 23, 42, 0.08);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-primary: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.1);
            --card-btn-bg: #4f46e5;
            --card-btn-active: #dc3545;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            transition: background 0.5s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        /* Navbar & Branding */
        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Floating Interactive Student Cards */
        .student-card-wrapper {
            perspective: 1000px;
            transition: transform 0.3s ease;
        }

        .student-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.5s cubic-bezier(0.25, 0.8, 0.25, 1), border-color 0.3s ease;
            transform-style: preserve-3d;
        }

        .student-card:hover {
            transform: translateY(-8px) rotateX(4deg) rotateY(-2deg) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 25px var(--accent-glow);
            border-color: var(--accent-primary);
        }

        .student-photo-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .student-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            background-color: #334155;
        }

        /* Custom Details Drawer */
        .extra-details {
            display: none;
            border-top: 1px dashed var(--glass-border);
            margin-top: 15px;
            padding-top: 15px;
            font-size: 0.9rem;
        }

        /* Button Styling & Animated Transitions */
        .btn-toggle-details {
            background-color: var(--card-btn-bg);
            border: none;
            color: white;
            font-weight: 500;
            border-radius: 10px;
            padding: 8px 16px;
            transition: background-color 0.4s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .btn-toggle-details:hover {
            box-shadow: 0 4px 12px var(--accent-glow);
            transform: translateY(-1px);
        }

        /* Theme Switcher Toggle */
        .theme-switch-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-main);
            transition: all 0.3s ease;
        }
        .theme-switch-btn:hover {
            transform: rotate(30deg);
            background: var(--accent-primary);
            color: white;
        }

        /* Form Controls Overrides */
        .form-control, .form-select {
            background: rgba(15, 23, 42, 0.2);
            border: 1px solid var(--glass-border);
            color: var(--text-main) !important;
            border-radius: 10px;
            padding: 10px 14px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(15, 23, 42, 0.4);
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .form-select option {
            background: #1e1b4b;
            color: #f8fafc;
        }
        [data-bs-theme="light"] .form-select option {
            background: #ffffff;
            color: #0f172a;
        }

        /* Dropdown Styling */
        .dropdown-menu {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
        }
        .dropdown-item {
            color: var(--text-main);
            cursor: pointer;
        }
        .dropdown-item:hover {
            background-color: var(--accent-primary);
            color: white;
        }

        /* Empty State */
        #no-results {
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg glass-panel sticky-top mx-3 mt-3 px-4 py-2">
        <div class="container-fluid px-0">
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <i class="bi bi-mortarboard-fill fs-3 text-primary"></i>
                <span class="fs-4">EduPulse</span>
            </a>
            <div class="d-flex align-items-center gap-3 ms-auto">
                <button class="theme-switch-btn" id="theme-toggle" aria-label="Toggle Theme">
                    <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4">
        <div class="row g-4">
            
            <div class="col-xl-4 col-lg-5">
                <div class="glass-panel p-4 position-sticky" style="top: 95px;">
                    <h3 class="mb-2 fw-bold text-gradient d-flex align-items-center gap-2">
                        <i class="bi bi-person-plus-fill text-primary"></i> Onboard Student
                    </h3>
                    <p class="text-muted small mb-4">Incorporate a new student profile into the cloud index instantly.</p>
                    
                    <form id="add-student-form" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Full Name</label>
                            <input type="text" id="form-name" class="form-control" placeholder="Jane Doe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Email Address</label>
                            <input type="email" id="form-email" class="form-control" placeholder="jane.doe@university.edu" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-semibold">Course Module</label>
                                <select id="form-course" class="form-select" required>
                                    <option value="" disabled selected>Select Course</option>
                                    <option value="JavaScript">JavaScript</option>
                                    <option value="Web Development">Web Development</option>
                                    <option value="React">React</option>
                                    <option value="Python">Python</option>
                                    <option value="Data Science">Data Science</option>
                                    <option value="UI/UX Design">UI/UX Design</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-semibold">Branch Track</label>
                                <input type="text" id="form-branch" class="form-control" placeholder="Computer Science" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-5 mb-3">
                                <label class="form-label small fw-semibold">CGPA</label>
                                <input type="number" id="form-cgpa" class="form-control" step="0.01" min="0" max="10" placeholder="9.45" required>
                            </div>
                            <div class="col-md-7 mb-4">
                                <label class="form-label small fw-semibold">Avatar Image URL</label>
                                <input type="url" id="form-photo" class="form-control" placeholder="https://images.unsplash.com/..." required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2.5 fw-bold rounded-3 shadow-sm d-flex align-items-center justify-content-center gap-2">
                            <i class="bi bi-cloud-arrow-up-fill"></i> Deploy Student Profile
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-xl-8 col-lg-7">
                <div class="glass-panel p-3 mb-4 d-flex flex-column flex-md-row gap-3 justify-content-between align-items-center">
                    <div class="input-group style-search-group flex-grow-1">
                        <span class="input-group-text border-end-0 bg-transparent" style="border-color: var(--glass-border)">
                            <i class="bi bi-search text-muted"></i>
                        </span>
                        <input type="text" id="search-box" class="form-control border-start-0 ps-0" placeholder="Filter profiles dynamically by name or email query...">
                    </div>
                    
                    <div class="dropdown min-w-md-180 text-end">
                        <button class="btn btn-secondary dropdown-toggle bg-transparent border-1 w-100 text-start d-flex justify-content-between align-items-center text-main" type="button" id="courseFilterDropdown" data-bs-toggle="dropdown" aria-expanded="false" style="border-color: var(--glass-border)">
                            <span id="selected-course-label"><i class="bi bi-funnel-fill me-2 text-primary"></i>All Courses</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end w-100" aria-labelledby="courseFilterDropdown" id="course-filter-options">
                            <li><a class="dropdown-item active" data-value="All Courses">All Courses</a></li>
                            <li><a class="dropdown-item" data-value="JavaScript">JavaScript</a></li>
                            <li><a class="dropdown-item" data-value="Web Development">Web Development</a></li>
                            <li><a class="dropdown-item" data-value="React">React</a></li>
                            <li><a class="dropdown-item" data-value="Python">Python</a></li>
                            <li><a class="dropdown-item" data-value="Data Science">Data Science</a></li>
                            <li><a class="dropdown-item" data-value="UI/UX Design">UI/UX Design</a></li>
                        </ul>
                    </div>
                </div>

                <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4" id="student-grid">
                    </div>

                <div id="no-results" class="text-center py-5 glass-panel mt-4">
                    <i class="bi bi-exclamation-diamond text-warning display-3 mb-3 d-block"></i>
                    <h4 class="fw-bold">No Students Found</h4>
                    <p class="text-muted mb-0">No records correspond to your selected filters or keywords.</p>
                </div>
            </div>

        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Global Array Containing Seed Data (5 base objects)
       let students = [];

fetch("https://jsonplaceholder.typicode.com/users")
.then((response) => response.json())
.then((data) => {

    students = data.map((user) => ({
        name: user.name,
        email: user.email,
        course: "Web Development",
        branch: user.company.name,
        cgpa: (Math.random() * 2 + 8).toFixed(2),
        photo: `https://i.pravatar.cc/150?img=${user.id}`
    }));

    renderStudents();
});

        // Active filter state memory variables
        let selectedCourse = "All Courses";
        let searchQuery = "";

        $(document).ready(function () {

    initTheme();


            // 1. Search Box input listener (keyup real-time)
            $('#search-box').on('keyup', function() {
                searchQuery = $(this).val().toLowerCase().trim();
                filterAndApplyGrid();
            });

            // 2. Dropdown Filter Option listener
            $('#course-filter-options').on('click', '.dropdown-item', function(e) {
                e.preventDefault();
                $('#course-filter-options .dropdown-item').removeClass('active');
                $(this).addClass('active');
                
                selectedCourse = $(this).data('value');
                $('#selected-course-label').html(`<i class="bi bi-funnel-fill me-2 text-primary"></i>${selectedCourse}`);
                
                filterAndApplyGrid();
            });

            // 3. SlideToggle Expand details & Button Color/Text Dynamic Manipulation Engine
            $('#student-grid').on('click', '.btn-toggle-details', function() {
                const $button = $(this);
                const $detailsDrawer = $button.closest('.student-card').find('.extra-details');
                
                $detailsDrawer.slideToggle(400, function() {
                    // Action checks after completion of slide toggle
                    if ($detailsDrawer.is(':visible')) {
                        $button.html('<i class="bi bi-chevron-up me-1"></i> Hide Details');
                        // Smoothly transition background state to active accent variant using jQuery css overrides
                        $button.css({
                            'background-color': 'var(--card-btn-active)'
                        });
                    } else {
                        $button.html('<i class="bi bi-chevron-down me-1"></i> Show Details');
                        $button.css({
                            'background-color': 'var(--card-btn-bg)'
                        });
                    }
                });
            });

            // 4. Form Submission Handling
            $('#add-student-form').on('submit', function(e) {
                e.preventDefault();
                
                // Form Native Constraints validation check
                if (!this.checkValidity()) {
                    e.stopPropagation();
                    $(this).addClass('was-validated');
                    return;
                }

                // Gather inputs via object packaging
                const newStudent = {
                    name: $('#form-name').val().trim(),
                    email: $('#form-email').val().trim(),
                    course: $('#form-course').val(),
                    branch: $('#form-branch').val().trim(),
                    cgpa: parseFloat($('#form-cgpa').val()).toFixed(2),
                    photo: $('#form-photo').val().trim()
                };

                // Add to array memory architecture
                students.unshift(newStudent);

                // UI Cleanup & Refresh
                renderStudents();
                this.reset();
                $(this).removeClass('was-validated');
            });

            // 5. Light/Dark Theme Switching System
            $('#theme-toggle').on('click', function() {
                let currentTheme = $('html').attr('data-bs-theme');
                let targetTheme = (currentTheme === 'dark') ? 'light' : 'dark';
                applyTheme(targetTheme);
            });
        });

        // Loop array and output templates structure securely via query layout injection
        function renderStudents() {
            filterAndApplyGrid();
        }

        // Combined filter pipeline parsing conditions simultaneously 
        function filterAndApplyGrid() {
            const $grid = $('#student-grid');
            $grid.empty();

            let matchedCount = 0;

            students.forEach((student) => {
                const matchesCourse = (selectedCourse === "All Courses" || student.course === selectedCourse);
                const matchesSearch = (student.name.toLowerCase().includes(searchQuery) || student.email.toLowerCase().includes(searchQuery));

                if (matchesCourse && matchesSearch) {
                    matchedCount++;
                    
                    // Template literal configuration structure mapping
                    const cardTemplate = `
                        <div class="col student-card-wrapper">
                            <div class="student-card p-4 h-100 d-flex flex-column justify-content-between">
                                <div>
                                    <div class="student-photo-container mb-3">
                                        <img src="${student.photo}" alt="${student.name}" class="student-photo" onerror="this.src='https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=400'">
                                    </div>
                                    <div class="text-center mb-3">
                                        <h5 class="fw-bold mb-1 tracking-tight text-main">${student.name}</h5>
                                        <span class="badge rounded-pill px-3 py-2 bg-primary-subtle text-primary border border-primary-subtle">${student.course}</span>
                                    </div>
                                    
                                    <div class="extra-details">
                                        <div class="d-flex align-items-center gap-2 mb-2">
                                            <i class="bi bi-envelope-at text-muted"></i>
                                            <span class="text-truncate text-main" title="${student.email}">${student.email}</span>
                                        </div>
                                        <div class="d-flex align-items-center gap-2 mb-2">
                                            <i class="bi bi-diagram-3 text-muted"></i>
                                            <span class="text-main">${student.branch}</span>
                                        </div>
                                        <div class="d-flex align-items-center gap-2">
                                            <i class="bi bi-star-fill text-warning"></i>
                                            <span class="fw-bold text-main">CGPA: ${student.cgpa}</span>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="mt-4 pt-2 text-center border-0 bg-transparent">
                                    <button class="btn btn-toggle-details w-100 d-flex align-items-center justify-content-center gap-1">
                                        <i class="bi bi-chevron-down me-1"></i> Show Details
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    $grid.append(cardTemplate);
                }
            });

            // Toggle "No Students Found" indicator box visibility based on filtered output count
            if (matchedCount === 0) {
                $('#no-results').fadeIn(300);
            } else {
                $('#no-results').hide();
            }
        }

        // Theme persistent validation and processing engine
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            applyTheme(savedTheme);
        }

        function applyTheme(theme) {
            $('html').attr('data-bs-theme', theme);
            localStorage.setItem('theme', theme);
            
            const $icon = $('#theme-icon');
            if (theme === 'dark') {
                $icon.removeClass('bi-sun-fill').addClass('bi-moon-stars-fill');
            } else {
                $icon.removeClass('bi-moon-stars-fill').addClass('bi-sun-fill');
            }
        }
    </script>
</body>
</html>
